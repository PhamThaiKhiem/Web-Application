- name: Install MySQL server and Python connector
  apt:
    name:
      - mariadb-server
      - python3-pymysql
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Start and enable MySQL service
  systemd:
    name: mariadb
    state: started
    enabled: true

- name: Allow remote connections (bind-address 0.0.0.0)
  lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^bind-address'
    line: 'bind-address = 0.0.0.0'
  notify: restart mariadb

- name: Flush handlers to apply bind-address change before continuing
  meta: flush_handlers

- name: Load TaskManager database schema
  template:
    src: schema.sql.j2
    dest: /tmp/schema.sql
    mode: '0644'

- name: Import schema into MySQL
  shell: mysql < /tmp/schema.sql
  args:
    executable: /bin/bash

- name: Create taskmgr application user with remote access from webserver
  shell: |
    mysql <<'SQL'
    CREATE USER IF NOT EXISTS 'taskmgr'@'172.16.1.10' IDENTIFIED BY 'Db_S3cr3t_2024_wr4pp3r';
    GRANT ALL PRIVILEGES ON taskmanager.* TO 'taskmgr'@'172.16.1.10';
    FLUSH PRIVILEGES;
    SQL
  args:
    executable: /bin/bash

- name: Remove temporary schema file
  file:
    path: /tmp/schema.sql
    state: absent
