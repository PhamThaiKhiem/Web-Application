name: library-taskmanager-webapp

hosts:
- name: attacker
  base_box:
    image: kali
    mgmt_user: debian
  flavor: standard.kali
  
- name: webserver
  base_box:
    image: debian-12-x86_64
    mgmt_user: debian
  flavor: standard.small
  
- name: db-server
  base_box:
    image: debian-12-x86_64
    mgmt_user: debian
  flavor: standard.small

routers:
- name: router
  base_box:
    image: debian-12-x86_64
    mgmt_user: debian
  flavor: standard.small

wan:
  name: internet-connection
  cidr: 100.100.100.0/24

networks:
- name: switch
  cidr: 172.16.1.0/24

net_mappings:
- host: attacker
  network: switch
  ip: 172.16.1.100
- host: webserver
  network: switch
  ip: 172.16.1.10
- host: db-server
  network: switch
  ip: 172.16.1.20

router_mappings:
- router: router
  network: switch
  ip: 172.16.1.1

groups:
- name: hosts
  nodes:
  - attacker
  - webserver
  - db-server
